<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet App</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="menu.css">
</head>
<body>
  <div class="container">
    <h2>Menú Principal</h2>
    <div class="form-group">
      <label for="balance">Dinero en cuenta:</label>
      <h3 id="saldo-cuenta">$0</h3>
    </div>
    
    <button type="button" id="btn-depositar" class="btn btn-primary">Depositar</button>
    <button type="button" id="btn-enviar" class="btn btn-primary">Enviar Dinero</button>
    <button type="button" id="btn-movimientos" class="btn btn-primary">Últimos Movimientos</button>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="menu.js"></script>
</body>
</html>
