<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet App - Depositar</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="deposit.css">
</head>
<body>
  <div class="container">
    <h2>Depositar</h2>
    
    <div id="alert-container"></div>

    <form>
      <div class="form-group">
        <label>Saldo Actual: $<span id="saldo-actual"></span></label>
      </div>

      <div class="form-group">
        <label for="depositAmount">Monto a depositar:</label>
        <input type="number" class="form-control" id="depositAmount" placeholder="Ingresar monto">
      </div>
      <button type="button" id="btn-depositar" class="btn btn-primary btn-block">Realizar depósito</button>
    </form>
    
    <div id="leyenda-deposito" class="mt-3 text-center text-success font-weight-bold"></div>

    <a href="menu.html" class="btn btn-secondary btn-block mt-3
